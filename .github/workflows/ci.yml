name: CI

on:
  push:
    branches: [dev-nestjs, main]
  pull_request:
    branches: [dev-nestjs, main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e -- --passWithNoTests
