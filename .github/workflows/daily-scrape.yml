name: Daily Land Scraping

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC (12:00 Minsk time)
  workflow_dispatch:  # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache Puppeteer browser
      uses: actions/cache@v4
      with:
        path: ~/.cache/puppeteer
        key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: puppeteer-${{ runner.os }}-

    - name: Install dependencies
      run: npm ci

    - name: Install Puppeteer browser
      run: npx puppeteer browsers install chrome

    - name: Create data directory
      run: mkdir -p src/data

    - name: Run scraper
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_LAND_AUCTIONS_CHAT_ID }}
      run: npm start

    - name: Commit updated data via PR
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/data/
        if git diff --cached --quiet; then
          echo "No data changes, skipping PR"
          exit 0
        fi
        DATE=$(date '+%Y-%m-%d')
        BRANCH="chore/data-${DATE}-${GITHUB_RUN_ID}"
        git checkout -b "$BRANCH"
        git commit -m "chore: update scraped data [${DATE}]"
        git push origin "$BRANCH"
        PR_URL=$(gh pr create \
          --title "chore: update scraped data [${DATE}]" \
          --body "Automated data update from daily scrape workflow." \
          --base main \
          --head "$BRANCH")
        gh pr merge "$PR_URL" --merge --admin
