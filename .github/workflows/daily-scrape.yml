name: Daily Land Scrape

# TODO: this workflow is a temporary workaround — see src/modules/land-auctions/_TODO.md
on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC (11:00 Minsk time)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: puppeteer-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Run scrape
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_LAND_AUCTIONS_CHAT_ID: ${{ secrets.TELEGRAM_LAND_AUCTIONS_CHAT_ID }}
        run: npm run scrape

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update scraped data [$(date '+%Y-%m-%d')]"
          git push
