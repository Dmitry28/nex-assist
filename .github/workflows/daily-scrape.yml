name: Daily Land Scrape

# TODO: this workflow is a temporary workaround — see src/modules/land-auctions/_TODO.md
on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC (10:00 Minsk time, UTC+3)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Puppeteer browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: puppeteer-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        run: |
          npx puppeteer browsers install chrome
          # Export the installed Chrome path so rebrowser-puppeteer uses it instead of
          # its bundled version (rebrowser-puppeteer@24.8.1 bundles a different Chrome
          # version than puppeteer@24.x, so we point it at the already-downloaded binary).
          echo "PUPPETEER_EXECUTABLE_PATH=$(node -p "require('puppeteer').executablePath()")" >> $GITHUB_ENV

      - name: Run scrape
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_LAND_AUCTIONS_CHAT_ID: ${{ vars.TELEGRAM_LAND_AUCTIONS_CHAT_ID }}
          TELEGRAM_BID_CARS_CHAT_ID: ${{ vars.TELEGRAM_BID_CARS_CHAT_ID }}
          TELEGRAM_KUFAR_CHAT_ID: ${{ vars.TELEGRAM_KUFAR_CHAT_ID }}
          PUPPETEER_EXECUTABLE_PATH: ${{ env.PUPPETEER_EXECUTABLE_PATH }}
        run: npm run scrape

      - name: Commit updated snapshots via PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes, skipping PR"
            exit 0
          fi
          DATE=$(date '+%Y-%m-%d')
          BRANCH="chore/data-${DATE}-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "chore: update scraped data [${DATE}]"
          git push origin "$BRANCH"
          BASE_BRANCH="${GITHUB_REF_NAME}"
          PR_URL=$(gh pr create \
            --title "chore: update scraped data [${DATE}]" \
            --body "Automated data update from daily scrape workflow." \
            --base "$BASE_BRANCH" \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --merge --auto
