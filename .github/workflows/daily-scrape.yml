name: Daily Land Scraping

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC (12:00 Minsk time)
  workflow_dispatch:  # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache Puppeteer browser
      uses: actions/cache@v4
      with:
        path: ~/.cache/puppeteer
        key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: puppeteer-${{ runner.os }}-

    - name: Install dependencies
      run: npm ci

    - name: Install Puppeteer browser
      run: npx puppeteer browsers install chrome

    - name: Create data directory
      run: mkdir -p src/data

    - name: Run scraper
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_LAND_AUCTIONS_CHAT_ID }}
      run: npm start

    - name: Commit updated data
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add src/data/
        git diff --cached --quiet || git commit -m "chore: update scraped data [$(date '+%Y-%m-%d')]"
        git push
